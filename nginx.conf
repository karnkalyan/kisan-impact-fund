# Nginx configuration for kisanimpactfund.com & www.kisanimpactfund.com
# Save as: /etc/nginx/sites-available/kisanimpactfund.com
# Enable with: sudo ln -s /etc/nginx/sites-available/kisanimpactfund.com /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;

    server_name kisanimpactfund.com www.kisanimpactfund.com;

    # Webroot path specified
    root /var/www/kisan-imapct-fund;
    index index.html index.htm;

    # Logging
    access_log /var/log/nginx/kisanimpactfund.access.log;
    error_log /var/log/nginx/kisanimpactfund.error.log;

    # Certbot ACME Challenge directory for SSL renewal
    location /.well-known/acme-challenge/ {
        root /var/www/kisan-imapct-fund;
    }

    # Reverse Proxy to Node.js App (PM2 on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optimizations & Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
