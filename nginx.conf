# Nginx configuration for kisanimpactfund.com & www.kisanimpactfund.com
# Save as: /etc/nginx/sites-available/kisanimpactfund.com
# Enable with: sudo ln -s /etc/nginx/sites-available/kisanimpactfund.com /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;

    server_name kisanimpactfund.com www.kisanimpactfund.com;

    # Root directory pointing to built static client assets
    root /var/www/kisan-impact-fund/dist/client;
    index index.html index.htm;

    # Logging
    access_log /var/log/nginx/kisanimpactfund.access.log;
    error_log /var/log/nginx/kisanimpactfund.error.log;

    # Certbot ACME Challenge directory for SSL renewal
    location /.well-known/acme-challenge/ {
        root /var/www/kisan-impact-fund;
        allow all;
    }

    # Pure Static Site Serving (No PM2 / Node.js required!)
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Optimizations & Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
